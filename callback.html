<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Sync - Summer Sun Planner</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fdfaf6;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      max-width: 400px;
      width: 90%;
      text-align: center;
      border: 1px solid rgba(234,179,8,0.15);
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem 0;
      color: #1DB954;
    }
    p {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .code-box {
      background: #f4f4f5;
      padding: 1rem;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.1rem;
      word-break: break-all;
      margin-bottom: 1.5rem;
      border: 1px solid #e4e4e7;
      color: #27272a;
    }
    button {
      background: #1DB954;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s, transform 0.2s;
    }
    button:hover {
      background: #1ed760;
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(1px);
    }
    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>

  <div class="card" id="main-card">
    <h1 id="title">Syncing...</h1>
    <p id="desc">Extracting secure code from Spotify.</p>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');

      const card = document.getElementById('main-card');

      if (error) {
        card.innerHTML = `
          <h1 class="error">Access Denied</h1>
          <p>You did not grant access to Spotify. Please close this tab and try again.</p>
        `;
      } else if (code) {
        card.innerHTML = `
          <h1>Successfully Linked!</h1>
          <p>Copy your secure Sync Code below and paste it back into your Summer Sun Planner widget.</p>
          <div class="code-box" id="code-val">${code}</div>
          <button id="copy-btn">Copy Sync Code</button>
        `;
        
        document.getElementById('copy-btn').addEventListener('click', () => {
          navigator.clipboard.writeText(code).then(() => {
            const btn = document.getElementById('copy-btn');
            btn.textContent = 'Copied! ✓';
            btn.style.background = '#059669';
            setTimeout(() => {
              btn.textContent = 'Copy Sync Code';
              btn.style.background = '#1DB954';
            }, 3000);
          });
        });
      } else {
        card.innerHTML = `
          <h1 class="error">No Code Found</h1>
          <p>This page should only be accessed through the Spotify Connect button in your planner.</p>
        `;
      }
    });
  </script>
</body>
</html>
